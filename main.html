<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotação do Dólar</title>

    <link rel="stylesheet" href="scr/style.css">
</head>
<body>

    <header class="header">
        <div class="logo">
            💱 Consultor de Cotações
        </div>

        <div class="menu">
            <select id="selectMoeda">
                <option value="USD-BRL">Dólar</option>
                <option value="EUR-BRL">Euro</option>
                <option value="GBP-BRL">Libra</option>
                <option value="BTC-BRL">Bitcoin</option>
            </select>

            <button onclick="obterMoedas()">
                Atualizar
            </button>
        </div>
    </header>

    <div class="container">
        <h1 id="moeda">💵 Cotações</h1>

        <div class="card buy-card">
            <p class="titulo">Valor de Compra</p>
            <p id="buy" class="valor">R$ --</p>
        </div>

        <div class="card sell-card">
            <p class="titulo">Valor de Venda</p>
            <p id="sell" class="valor">R$ --</p>
        </div>

        <p id="status"></p>
    </div>

    <script src="scr/script.js"></script>
</body>
</html>
